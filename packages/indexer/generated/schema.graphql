"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

scalar BigInt

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ViewPageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Meta {
  status: JSON
}

type Query {
  auction(tokenId: BigInt!): auction
  auctions(where: auctionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): auctionPage!
  auctionEvent(id: String!): auctionEvent
  auctionEvents(where: auctionEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): auctionEventPage!
  bidEvent(id: String!): bidEvent
  bidEvents(where: bidEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): bidEventPage!
  settledEvent(id: String!): settledEvent
  settledEvents(where: settledEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): settledEventPage!
  _meta: Meta
}

